# Disposable PostgreSQL for Go integration tests (services/core/internal/contentsource).
#
# These tests write to content_source_reviews and content_source_events, both immutable at
# the DB level (BEFORE UPDATE OR DELETE triggers). The tests cannot and do not clean up
# after themselves. NEVER point TEST_DATABASE_URL at the dev/prod database in
# docker-compose.yml — always use this disposable service instead, and destroy it after the
# test run.
#
# Explicit `name: sidus-test` below keeps this project's containers, network, and volumes
# fully separate from the dev project (`name: sidus` in docker-compose.yml). Without it,
# both files run from the same repo root and Compose would derive the same default project
# name from the directory, causing `down -v` here to touch dev resources too.
#
# There is no Compose "migrate" service — migrations run via the Go migrate command
# (services/core/cmd/migrate), executed through the golang Docker image (no host Go
# toolchain required). See docs/local-setup.md and the commands below.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml exec -T postgres-test pg_isready -U sidus_test -d sidus_test
#   docker run --rm --network sidus-test_default -v "$(pwd)/services/core:/app" -w /app \
#     -e DATABASE_URL="postgres://sidus_test:sidus_test_password@postgres-test:5432/sidus_test?sslmode=disable" \
#     golang:1.22-alpine go run ./cmd/migrate
#   cd services/core && TEST_DATABASE_URL="postgres://sidus_test:sidus_test_password@localhost:${TEST_POSTGRES_PORT:-55432}/sidus_test?sslmode=disable" go test ./... -run Integration -v
#   docker compose -f docker-compose.test.yml down -v   # destroys ONLY sidus-test project resources
name: sidus-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sidus_test
      POSTGRES_PASSWORD: sidus_test_password
      POSTGRES_DB: sidus_test
    ports:
      - "${TEST_POSTGRES_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidus_test -d sidus_test"]
      interval: 2s
      timeout: 5s
      retries: 20
