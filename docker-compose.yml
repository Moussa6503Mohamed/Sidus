name: sidus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sidus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidus_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sidus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sidus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidus} -d ${POSTGRES_DB:-sidus}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sidus_postgres_data:
